kind = "mobile"
previewPath = "/"
title = "Vybe - Group Dining Decider"
version = "1.0.0"
id = "artifacts/vybe"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 19440
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/vybe run dev"

[services.env]
PORT = "19440"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/vybe", "run", "build"]
run = ["pnpm", "--filter", "@workspace/vybe", "run", "serve"]
